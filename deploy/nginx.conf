server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Userscript managers (Tampermonkey/Violentmonkey) only intercept files
    # served as JavaScript. Force the content-type and disable caching so users
    # always fetch the latest build.
    location = /chatgpt.user.js {
        default_type text/javascript;
        add_header Content-Type "text/javascript; charset=utf-8";
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/javascript application/javascript text/css text/html;
}
