name: Deploy

# Builds the static install site (landing page + userscript) and deploys it.
#
#  • Always: builds dist-site/ and uploads it as a workflow artifact.
#  • Cloudflare Pages: runs only when CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets are set.
#  • Docker image: published to GHCR on pushes to master (uses the built-in GITHUB_TOKEN).
#
# Manual trigger via the Actions tab is also supported (workflow_dispatch).

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Build revenue-armed static site
        run: pnpm run site:build:revenue
        env:
          MINT_CHECKOUT_URL: ${{ secrets.MINT_CHECKOUT_URL }}
          MINT_PUBLIC_JWK: ${{ secrets.MINT_PUBLIC_JWK }}
          VITE_EXPORTER_PUBLIC_JWK: ${{ secrets.VITE_EXPORTER_PUBLIC_JWK }}
      - uses: actions/upload-artifact@v7
        with:
          name: chatgpt-exporter-site
          path: dist-site
          if-no-files-found: error

  deploy-cloudflare:
    needs: build-site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # wrangler-action resolves the package manager from package.json
      # (packageManager: pnpm), so pnpm must exist on PATH in this job too.
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Check for Cloudflare credentials
        id: creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secrets not set — skipping Pages deploy."
          fi
      - uses: actions/download-artifact@v8
        if: steps.creds.outputs.ready == 'true'
        with:
          name: chatgpt-exporter-site
          path: dist-site
      - name: Deploy to Cloudflare Pages
        if: steps.creds.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-site --project-name=chatgpt-exporter

  docker:
    needs: build-site
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            MINT_CHECKOUT_URL=${{ secrets.MINT_CHECKOUT_URL }}
            MINT_PUBLIC_JWK=${{ secrets.MINT_PUBLIC_JWK }}
            REQUIRE_PRO_CHECKOUT=1
            VITE_EXPORTER_PUBLIC_JWK=${{ secrets.VITE_EXPORTER_PUBLIC_JWK }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
